<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">

    <!-- Калькулятор -->
    <div class="calculator">
      <h1 class="title">Калькулятор</h1>

      <!-- Дисплей -->
      <div class="display-section">
        <div id="expression" class="expression"></div>
        <div id="display" class="display">0</div>
        <div id="error-msg" class="error-msg"></div>
      </div>

      <!-- Кнопки -->
      <div id="buttons" class="buttons">
        <button data-action="clear"              class="btn btn-clear">C</button>
        <button data-action="backspace"          class="btn btn-util">⌫</button>
        <button data-action="percent"            class="btn btn-util">%</button>
        <button data-action="operator" data-value="/" class="btn btn-op">÷</button>

        <button data-action="digit" data-value="7" class="btn">7</button>
        <button data-action="digit" data-value="8" class="btn">8</button>
        <button data-action="digit" data-value="9" class="btn">9</button>
        <button data-action="operator" data-value="*" class="btn btn-op">×</button>

        <button data-action="digit" data-value="4" class="btn">4</button>
        <button data-action="digit" data-value="5" class="btn">5</button>
        <button data-action="digit" data-value="6" class="btn">6</button>
        <button data-action="operator" data-value="-" class="btn btn-op">−</button>

        <button data-action="digit" data-value="1" class="btn">1</button>
        <button data-action="digit" data-value="2" class="btn">2</button>
        <button data-action="digit" data-value="3" class="btn">3</button>
        <button data-action="operator" data-value="+" class="btn btn-op">+</button>

        <button data-action="digit" data-value="0" class="btn btn-zero">0</button>
        <button data-action="decimal"            class="btn">.</button>
        <button data-action="equals"             class="btn btn-equals">=</button>
      </div>
    </div>

    <!-- История вычислений -->
    <div class="history">
      <div class="history-header">
        <h2>История</h2>
        <div class="history-controls">
          <select id="filter-op" title="Фильтр по оператору">
            <option value="">Все</option>
            <option value="+">+</option>
            <option value="-">−</option>
            <option value="*">×</option>
            <option value="/">÷</option>
          </select>
          <button id="btn-clear-history" class="btn-sm">Очистить</button>
        </div>
      </div>
      <ul id="history-list"></ul>
    </div>

  </div>

  <script type="module" src="js/ui.js"></script>
</body>
</html>
